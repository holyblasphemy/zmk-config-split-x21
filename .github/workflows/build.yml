on: [push, pull_request, workflow_dispatch]

name: Build

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (X21 Left)
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=x21_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: X21 Left Kconfig file
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename left zmk.uf2
        run: cp build/zephyr/zmk.uf2 x21_left_nice_nano_v2.uf2

      - name: Archive (X21 Left)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-left
          path: x21_left_nice_nano_v2.uf2

      - name: West Build (X21 Right)
        run: west build --pristine -s zmk/app -b nice_nano_v2 -- -DSHIELD=x21_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: X21 Right Kconfig file
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename right zmk.uf2
        run: cp build/zephyr/zmk.uf2 x21_right_nice_nano_v2.uf2

      - name: Archive (X21 Right)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-right
          path: x21_right_nice_nano_v2.uf2
